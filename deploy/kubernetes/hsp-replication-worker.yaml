apiVersion: apps/v1
kind: Deployment
metadata:
  name: hsp-replication-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hsp-replication-worker
  template:
    metadata:
      labels:
        app: hsp-replication-worker
    spec:
      serviceAccountName: hsp-replication-worker
      containers:
        - name: worker
          image: ghcr.io/example/hsp/hsp-s3:0.1.0
          args: ["worker", "replication"]
          env:
            - name: HSP_ROOT_DIR
              value: /var/lib/hsp
            - name: HSP_ISSUER_REGISTRY
              value: /etc/hsp/issuer-registry.json
            - name: HSP_AWS_KMS_RUNTIME
              value: live-cli
          volumeMounts:
            - name: hsp-data
              mountPath: /var/lib/hsp
            - name: hsp-config
              mountPath: /etc/hsp
              readOnly: true
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: hsp-data
          emptyDir: {}
        - name: hsp-config
          configMap:
            name: hsp-config
